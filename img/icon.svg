<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
	<style>
		@font-face {
			font-family: 'Baloo';
			font-style: normal;
			font-weight: 600;
			src: url(data:font/woff;base64,) format('woff');
		}
	</style>
	<defs>
		<mask id="cutout">
			<rect width="100%" height="100%" fill="white" />
			<text font-family="Baloo" font-weight="600" font-size="14" x="8" y="8" text-anchor="middle" dominant-baseline="central" fill="black" text-rendering="geometricPrecision">N</text>
		</mask>
	</defs>
	<rect width="100%" height="100%" rx="30%" fill="#fb8c00" mask="url(#cutout)"/>
</svg>
